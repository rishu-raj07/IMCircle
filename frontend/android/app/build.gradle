apply plugin: 'com.android.application'

import java.util.Properties

// Native Google Maps SDK key — read from local.properties (gitignored,
// per-machine) or a MAPS_API_KEY environment variable (for CI/production
// build pipelines). Never hardcoded. Not currently required — this app
// uses the web Google Maps JS API (VITE_GMAPS_BROWSER_KEY) inside the
// WebView, not the native Maps SDK, so an empty value here is harmless;
// this is prepared for if/when a native Capacitor Maps plugin is added.
def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localProperties.load(new FileInputStream(localPropertiesFile))
}
def mapsApiKey = localProperties.getProperty("MAPS_API_KEY") ?: System.getenv("MAPS_API_KEY") ?: ""

android {
    namespace = "com.imcircle.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.imcircle.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // versionCode MUST increase by at least 1 on every Play Store
        // upload — Play Console rejects a build with a versionCode it has
        // already seen. versionName is the human-readable string shown to
        // users; bump it however you like (semver recommended).
        versionCode 1
        versionName "1.0.0"
        manifestPlaceholders = [mapsApiKey: mapsApiKey]
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    // -------------------------------------------------------------------
    // SIGNING — required to generate a release AAB for Play Store upload.
    // No keystore is created or committed here (a real signing key must
    // never be checked into source control). To build a signed release:
    //   1. Generate a keystore once:
    //        keytool -genkey -v -keystore imcircle-release.keystore \
    //          -alias imcircle -keyalg RSA -keysize 2048 -validity 10000
    //   2. Keep that .keystore file OUTSIDE this repo (or gitignored) and
    //      back it up somewhere safe — losing it means you can never
    //      publish an update to the same Play Store listing again.
    //   3. Create android/keystore.properties (gitignored, NOT committed)
    //      containing:
    //        storeFile=/absolute/path/to/imcircle-release.keystore
    //        storePassword=...
    //        keyAlias=imcircle
    //        keyPassword=...
    //   4. Uncomment the signingConfigs/signingConfig blocks below.
    // -------------------------------------------------------------------
    // def keystorePropertiesFile = rootProject.file("keystore.properties")
    // def keystoreProperties = new Properties()
    // if (keystorePropertiesFile.exists()) {
    //     keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
    // }
    // signingConfigs {
    //     release {
    //         storeFile file(keystoreProperties['storeFile'])
    //         storePassword keystoreProperties['storePassword']
    //         keyAlias keystoreProperties['keyAlias']
    //         keyPassword keystoreProperties['keyPassword']
    //     }
    // }

    buildTypes {
        release {
            // Shrinks and obfuscates the release build — smaller APK/AAB
            // and harder to reverse-engineer. Safe for a Capacitor app
            // since almost all real logic lives in the bundled JS, not
            // Java/Kotlin, but proguard-rules.pro is where you'd add
            // keep-rules if a native plugin ever breaks under minification.
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // signingConfig signingConfigs.release
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
